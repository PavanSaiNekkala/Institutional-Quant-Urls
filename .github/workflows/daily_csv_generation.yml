name: Institutional Data Pipeline

on:

  schedule:
    - cron: "30 2 * * *"

  workflow_dispatch:

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      # ===================================================
      # CHECKOUT
      # ===================================================

      - name: Checkout Repository

        uses: actions/checkout@v4

      # ===================================================
      # PYTHON
      # ===================================================

      - name: Setup Python

        uses: actions/setup-python@v5

        with:
          python-version: "3.11"

      # ===================================================
      # INSTALL
      # ===================================================

      - name: Install Dependencies

        run: |

          python -m pip install --upgrade pip

          pip install -r requirements.txt

      # ===================================================
      # CLEAN OLD GENERATED FILES
      # ===================================================

      - name: Remove Old Generated Files

        run: |

          rm -f database/*.db || true
          rm -f database/*.duckdb || true

          rm -f output/*.xlsx || true
          rm -f output/*.parquet || true

          rm -f cache/* || true

      # ===================================================
      # RUN MAIN PIPELINE
      # ===================================================

      - name: Run Institutional Pipeline

        run: |

          python main.py

      # ===================================================
      # VERIFY OUTPUT
      # ===================================================

      - name: Verify Outputs

        run: |

          ls output

      # ===================================================
      # COMMIT GENERATED FILES
      # ===================================================

      - name: Commit Fresh Outputs

        run: |

          git config --global user.name "github-actions"

          git config --global user.email "actions@github.com"

          git add output/*.xlsx || true

          git commit -m "Daily institutional rebuild" || echo "No changes"

          git push
